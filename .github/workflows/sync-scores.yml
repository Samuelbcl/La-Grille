name: Synchro des scores

# Appelle la route /api/sync-results de l'app pour récupérer les résultats finis
# du Mondial et mettre à jour le classement automatiquement.
# (Le cron Vercel gratuit ne tourne qu'1×/jour ; GitHub Actions permet ce rythme gratuitement.)

on:
  schedule:
    - cron: "*/10 * * * *" # toutes les ~10 minutes (UTC) — GitHub peut décaler un peu
  workflow_dispatch: {} # bouton "Run workflow" pour tester à la main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Déclencher la synchro
        run: |
          curl -sS --fail-with-body -X GET \
            --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 30 \
            "https://la-grille.vercel.app/api/sync-results" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
